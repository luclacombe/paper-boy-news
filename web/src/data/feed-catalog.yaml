bundles:
  - name: "Morning Briefing"
    description: "A balanced overview from the world's best free sources."
    feeds:
      - "guardian-world"
      - "npr-news"
      - "bbc-world"
      - "ap-news"
      - "reuters-world"

  - name: "Tech & Science"
    description: "Deep coverage of technology, science, and the digital world."
    feeds:
      - "ars-technica"
      - "wired"
      - "the-verge"
      - "quanta-magazine"
      - "hacker-news"

  - name: "Business & Finance"
    description: "Markets, economics, and business analysis."
    feeds:
      - "axios"
      - "dw-business"

categories:
  - name: "World News"
    feeds:
      - id: "guardian-world"
        name: "The Guardian"
        url: "https://www.theguardian.com/world/rss"
        description: "Free, comprehensive global coverage"
      - id: "bbc-world"
        name: "BBC World"
        url: "https://feeds.bbci.co.uk/news/world/rss.xml"
        description: "Global news from the BBC"
      - id: "ap-news"
        name: "AP News"
        url: "https://feedx.net/rss/ap.xml"
        description: "Associated Press top stories"
      - id: "al-jazeera"
        name: "Al Jazeera"
        url: "https://www.aljazeera.com/xml/rss/all.xml"
        description: "International perspective on global events"
      - id: "reuters-world"
        name: "Reuters World"
        url: "https://www.reuters.com/world/"
        description: "Global news from Reuters wire service"

  - name: "US News"
    feeds:
      - id: "npr-news"
        name: "NPR News"
        url: "https://feeds.npr.org/1001/rss.xml"
        description: "National Public Radio top stories"
      - id: "guardian-us"
        name: "The Guardian US"
        url: "https://www.theguardian.com/us-news/rss"
        description: "US news from The Guardian"
      - id: "fox-news"
        name: "Fox News"
        url: "https://moxie.foxnews.com/google-publisher/latest.xml"
        description: "Breaking news and politics from Fox News"
      - id: "washington-post"
        name: "The Washington Post"
        url: "http://feeds.washingtonpost.com/rss/politics"
        description: "Award-winning national news, politics, and investigations"

  - name: "Technology"
    feeds:
      - id: "ars-technica"
        name: "Ars Technica"
        url: "https://feeds.arstechnica.com/arstechnica/index"
        description: "In-depth tech analysis and reviews"
      - id: "the-verge"
        name: "The Verge"
        url: "https://www.theverge.com/rss/index.xml"
        description: "Technology, science, art, and culture"
      - id: "wired"
        name: "Wired"
        url: "https://www.wired.com/feed/rss"
        description: "Technology and culture"
      - id: "hacker-news"
        name: "Hacker News"
        url: "https://hnrss.org/frontpage"
        description: "Top stories from Y Combinator's Hacker News"
      - id: "techcrunch"
        name: "TechCrunch"
        url: "https://techcrunch.com/feed/"
        description: "Startup and technology news"

  - name: "Science"
    feeds:
      - id: "quanta-magazine"
        name: "Quanta Magazine"
        url: "https://api.quantamagazine.org/feed/"
        description: "Mathematics, physics, biology, and computer science"
      - id: "nature-news"
        name: "Nature News"
        url: "https://www.nature.com/nature.rss"
        description: "Latest research from Nature"
      - id: "new-scientist"
        name: "New Scientist"
        url: "https://www.newscientist.com/section/news/feed/"
        description: "Science and technology news"
      - id: "science-daily"
        name: "Science Daily"
        url: "https://www.sciencedaily.com/rss/all.xml"
        description: "Latest science research and discoveries"
      - id: "stat-news"
        name: "STAT News"
        url: "https://www.statnews.com/feed/"
        description: "Health, medicine, and life sciences reporting"
      - id: "scientific-american"
        name: "Scientific American"
        url: "https://www.scientificamerican.com"
        description: "Monthly magazine covering science, technology, and health"

  - name: "Politics"
    feeds:
      - id: "politico"
        name: "Politico"
        url: "https://rss.politico.com/politics-news.xml"
        description: "US politics and policy"
      - id: "propublica"
        name: "ProPublica"
        url: "https://feeds.propublica.org/propublica/main"
        description: "Investigative journalism in the public interest"

  - name: "Opinion & Analysis"
    feeds:
      - id: "the-new-yorker"
        name: "The New Yorker"
        url: "https://www.newyorker.com/feed/news"
        description: "Long-form journalism, commentary, and analysis"
      - id: "the-atlantic"
        name: "The Atlantic"
        url: "https://www.theatlantic.com/feed/all/"
        description: "Ideas, culture, and politics"
      - id: "the-conversation"
        name: "The Conversation"
        url: "https://theconversation.com/articles.atom"
        description: "Academic expertise, editorial independence"
      - id: "foreign-policy"
        name: "Foreign Policy"
        url: "https://foreignpolicy.com/feed/"
        description: "Global affairs analysis and commentary"
      - id: "project-syndicate"
        name: "Project Syndicate"
        url: "https://www.project-syndicate.org/rss"
        description: "Expert commentary on economics, politics, and world affairs"

  - name: "Business & Finance"
    feeds:
      - id: "bloomberg"
        name: "Bloomberg"
        url: "https://www.bloomberg.com/markets"
        description: "Markets, economics, and financial news"
      - id: "bloomberg-businessweek"
        name: "Bloomberg Businessweek"
        url: "https://www.bloomberg.com/businessweek"
        description: "Weekly business magazine features and analysis"
      - id: "reuters-business"
        name: "Reuters Business"
        url: "https://www.reuters.com/business/"
        description: "Business and financial news from Reuters"
      - id: "financial-times"
        name: "Financial Times"
        url: "https://www.ft.com/world?format=rss"
        description: "Global business and financial news"
      - id: "financial-times-opinion"
        name: "Financial Times Opinion"
        url: "https://www.ft.com/opinion?format=rss"
        description: "FT columnists and editorial"
      - id: "financial-times-markets"
        name: "Financial Times Markets"
        url: "https://www.ft.com/markets?format=rss"
        description: "Market data and analysis"
      - id: "financial-times-tech"
        name: "Financial Times Tech"
        url: "https://www.ft.com/technology?format=rss"
        description: "Technology news and analysis"
      - id: "axios"
        name: "Axios"
        url: "https://api.axios.com/feed/"
        description: "Smart brevity news summaries"
      - id: "morning-brew-marketing"
        name: "Morning Brew: Marketing"
        url: "https://www.marketingbrew.com/feed.xml"
        description: "Marketing and advertising news from Morning Brew"
      - id: "dw-business"
        name: "DW Business"
        url: "https://rss.dw.com/rdf/rss-en-bus"
        description: "International business from Deutsche Welle"
      - id: "kiplinger"
        name: "Kiplinger"
        url: "https://www.kiplinger.com/feed/rss"
        description: "Personal finance, investing, and retirement advice"

  - name: "Fashion"
    feeds:
      - id: "vogue"
        name: "Vogue"
        url: "https://www.vogue.com/feed/rss"
        description: "Fashion, beauty, and culture from Vogue"
      - id: "business-of-fashion"
        name: "Business of Fashion"
        url: "https://www.businessoffashion.com/feed"
        description: "Fashion industry news and analysis"

  - name: "Design & Architecture"
    feeds:
      - id: "dezeen"
        name: "Dezeen"
        url: "https://www.dezeen.com/feed/"
        description: "Architecture, interiors, and design"

  - name: "Food & Drink"
    feeds:
      - id: "eater"
        name: "Eater"
        url: "https://www.eater.com/rss/index.xml"
        description: "Restaurant news, food culture, and dining guides"

  - name: "Culture & Entertainment"
    feeds:
      - id: "rolling-stone"
        name: "Rolling Stone"
        url: "https://www.rollingstone.com/feed/"
        description: "Music, movies, TV, and pop culture"
      - id: "the-av-club"
        name: "The AV Club"
        url: "https://www.avclub.com/rss"
        description: "Pop culture reviews and commentary"

  - name: "Sports"
    feeds:
      - id: "bbc-sport"
        name: "BBC Sport"
        url: "https://feeds.bbci.co.uk/sport/rss.xml"
        description: "International sports coverage"
      - id: "espn"
        name: "ESPN"
        url: "https://www.espn.com/espn/rss/news"
        description: "US and global sports news"

  - name: "Space"
    feeds:
      - id: "nasa"
        name: "NASA"
        url: "https://www.nasa.gov/feed/"
        description: "Space exploration and missions from NASA"
      - id: "space-com"
        name: "Space.com"
        url: "https://www.space.com/feeds/all"
        description: "Astronomy, spaceflight, and the night sky"

  - name: "Environment & Climate"
    feeds:
      - id: "grist"
        name: "Grist"
        url: "https://grist.org/feed/"
        description: "Climate solutions and environmental journalism"
      - id: "inside-climate-news"
        name: "Inside Climate News"
        url: "https://insideclimatenews.org/feed/"
        description: "Pulitzer-winning climate and energy reporting"

  - name: "Gaming"
    feeds:
      - id: "polygon"
        name: "Polygon"
        url: "https://www.polygon.com/rss/index.xml"
        description: "Video games, entertainment, and internet culture"
      - id: "rock-paper-shotgun"
        name: "Rock Paper Shotgun"
        url: "https://www.rockpapershotgun.com/feed"
        description: "PC gaming news and reviews"

  - name: "Automotive"
    feeds:
      - id: "electrek"
        name: "Electrek"
        url: "https://electrek.co/feed/"
        description: "Electric vehicles, solar, and clean energy"
      - id: "the-drive"
        name: "The Drive"
        url: "https://www.thedrive.com/feed"
        description: "Cars, trucks, and automotive culture"

  - name: "Travel & History"
    feeds:
      - id: "smithsonian-magazine"
        name: "Smithsonian Magazine"
        url: "https://www.smithsonianmag.com/rss/latest_articles/"
        description: "History, science, travel, and culture"

  - name: "Photography"
    feeds:
      - id: "petapixel"
        name: "PetaPixel"
        url: "https://petapixel.com/feed/"
        description: "Photography news, gear, and techniques"
