bundles:
  - name: "Morning Briefing"
    description: "A balanced overview from the world's best free sources."
    feeds:
      - "guardian-world"
      - "npr-news"
      - "reuters-world"
      - "bbc-world"
      - "ap-news"

  - name: "Tech & Science"
    description: "Deep coverage of technology, science, and the digital world."
    feeds:
      - "ars-technica"
      - "wired"
      - "the-verge"
      - "quanta-magazine"
      - "hacker-news"

  - name: "Business & Finance"
    description: "Markets, economics, and business analysis."
    feeds:
      - "reuters-business"
      - "axios"
      - "morning-brew"
      - "bloomberg-free"
      - "ft-free"

categories:
  - name: "World News"
    feeds:
      - id: "guardian-world"
        name: "The Guardian"
        url: "https://www.theguardian.com/world/rss"
        description: "Free, comprehensive global coverage"
      - id: "reuters-world"
        name: "Reuters"
        url: "https://feeds.reuters.com/reuters/worldNews"
        description: "Wire service, factual reporting"
      - id: "bbc-world"
        name: "BBC World"
        url: "https://feeds.bbci.co.uk/news/world/rss.xml"
        description: "Global news from the BBC"
      - id: "ap-news"
        name: "AP News"
        url: "https://rsshub.app/apnews/topics/apf-topnews"
        description: "Associated Press top stories"
      - id: "al-jazeera"
        name: "Al Jazeera"
        url: "https://www.aljazeera.com/xml/rss/all.xml"
        description: "International perspective on global events"

  - name: "US News"
    feeds:
      - id: "npr-news"
        name: "NPR News"
        url: "https://feeds.npr.org/1001/rss.xml"
        description: "National Public Radio top stories"
      - id: "guardian-us"
        name: "The Guardian US"
        url: "https://www.theguardian.com/us-news/rss"
        description: "US news from The Guardian"

  - name: "Technology"
    feeds:
      - id: "ars-technica"
        name: "Ars Technica"
        url: "https://feeds.arstechnica.com/arstechnica/index"
        description: "In-depth tech analysis and reviews"
      - id: "the-verge"
        name: "The Verge"
        url: "https://www.theverge.com/rss/index.xml"
        description: "Technology, science, art, and culture"
      - id: "wired"
        name: "Wired"
        url: "https://www.wired.com/feed/rss"
        description: "Technology and culture"
      - id: "hacker-news"
        name: "Hacker News"
        url: "https://hnrss.org/frontpage"
        description: "Top stories from Y Combinator's Hacker News"
      - id: "techcrunch"
        name: "TechCrunch"
        url: "https://techcrunch.com/feed/"
        description: "Startup and technology news"

  - name: "Science"
    feeds:
      - id: "quanta-magazine"
        name: "Quanta Magazine"
        url: "https://api.quantamagazine.org/feed/"
        description: "Mathematics, physics, biology, and computer science"
      - id: "nature-news"
        name: "Nature News"
        url: "https://www.nature.com/nature.rss"
        description: "Latest research from Nature"
      - id: "new-scientist"
        name: "New Scientist"
        url: "https://www.newscientist.com/section/news/feed/"
        description: "Science and technology news"

  - name: "Politics"
    feeds:
      - id: "politico"
        name: "Politico"
        url: "https://rss.politico.com/politics-news.xml"
        description: "US politics and policy"
      - id: "the-hill"
        name: "The Hill"
        url: "https://thehill.com/feed/"
        description: "Political news and analysis"
      - id: "fivethirtyeight"
        name: "FiveThirtyEight"
        url: "https://fivethirtyeight.com/features/feed/"
        description: "Data-driven political analysis"

  - name: "Opinion & Analysis"
    feeds:
      - id: "the-atlantic"
        name: "The Atlantic"
        url: "https://www.theatlantic.com/feed/all/"
        description: "Ideas, culture, and politics"
      - id: "the-conversation"
        name: "The Conversation"
        url: "https://theconversation.com/articles.atom"
        description: "Academic expertise, editorial independence"
      - id: "project-syndicate"
        name: "Project Syndicate"
        url: "https://www.project-syndicate.org/rss"
        description: "Global commentary from leading thinkers"

  - name: "Business & Finance"
    feeds:
      - id: "reuters-business"
        name: "Reuters Business"
        url: "https://feeds.reuters.com/reuters/businessNews"
        description: "Global business news"
      - id: "bloomberg-free"
        name: "Bloomberg (free)"
        url: "https://feeds.bloomberg.com/markets/news.rss"
        description: "Markets and finance news"
      - id: "ft-free"
        name: "Financial Times (free)"
        url: "https://www.ft.com/rss/home"
        description: "FT free content"
      - id: "axios"
        name: "Axios"
        url: "https://api.axios.com/feed/"
        description: "Smart brevity news summaries"
      - id: "morning-brew"
        name: "Morning Brew"
        url: "https://www.morningbrew.com/daily/rss"
        description: "Daily business news digest"
