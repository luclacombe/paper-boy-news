name: Build Newspaper

on:
  repository_dispatch:
    # build-newspaper: on-demand "Get it now" path (web/src/actions/build.ts).
    # build / deliver:  fired by the Cloudflare Worker (cron-worker/) on a
    #                   reliable schedule. See docs/superpowers/plans/
    #                   2026-05-03-cf-worker-cron.md for context.
    types: [build-newspaper, build, deliver]
  schedule:
    # SAFETY NET during CF Worker migration. Removed in a follow-up PR after
    # 7 days of clean CF cron operation. Until then double-firing is harmless:
    # run_build_all() skips records whose status != 'failed', and
    # run_deliver()'s recency cap (PR 1) + resend_message_id idempotency
    # (PR 1) make a duplicate dispatch a no-op.
    - cron: "45 3,7,11,15,19,23 * * *"
    - cron: "0,30 * * * *"
  workflow_dispatch: # Manual debug trigger

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set BUILD_MODE
        # Resolves BUILD_MODE for every event source. MUST be the first step
        # so subsequent `if: env.BUILD_MODE == ...` conditions can read it.
        # Mapping:
        #   repository_dispatch + build           → build
        #   repository_dispatch + deliver         → deliver
        #   repository_dispatch + build-newspaper → ""  (record_id-driven)
        #   schedule + build cron (safety net)    → build
        #   schedule + deliver cron (safety net)  → deliver
        #   workflow_dispatch / anything else     → ""  (legacy run_scheduled)
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          MODE=""
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            case "$EVENT_ACTION" in
              build)            MODE="build" ;;
              deliver)          MODE="deliver" ;;
              build-newspaper)  MODE="" ;;
            esac
          elif [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "45 3,7,11,15,19,23 * * *") MODE="build" ;;
              "0,30 * * * *")             MODE="deliver" ;;
            esac
          fi
          echo "Resolved BUILD_MODE='${MODE}' (event=$EVENT_NAME action=$EVENT_ACTION schedule=$EVENT_SCHEDULE)"
          echo "BUILD_MODE=$MODE" >> "$GITHUB_ENV"

      - name: Check if any users need building
        id: precheck
        if: env.BUILD_MODE == 'build'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TIMEZONES=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/user_profiles?onboarding_complete=eq.true&select=timezone" \
            | jq -r '.[].timezone')
          NEED_BUILD=false
          for TZ_NAME in $TIMEZONES; do
            HOUR=$(TZ="$TZ_NAME" date +%-H)
            if [ "$HOUR" -lt 5 ]; then
              NEED_BUILD=true
              break
            fi
          done
          echo "needed=$NEED_BUILD" >> $GITHUB_OUTPUT

      - name: Validate record_id format (on-demand only)
        # The build/deliver dispatch types carry no client_payload, so the
        # validation only applies to the on-demand build-newspaper path.
        if: github.event_name == 'repository_dispatch' && github.event.action == 'build-newspaper'
        run: |
          RECORD_ID="${{ github.event.client_payload.record_id }}"
          if [[ ! "$RECORD_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]; then
            echo "::error::Invalid record_id format: $RECORD_ID"
            exit 1
          fi

      - name: Checkout repository
        if: env.BUILD_MODE != 'build' || steps.precheck.outputs.needed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        if: env.BUILD_MODE != 'build' || steps.precheck.outputs.needed == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: env.BUILD_MODE != 'build' || steps.precheck.outputs.needed == 'true'
        run: |
          pip install -e . > /dev/null 2>&1
          pip install -r scripts/requirements.txt > /dev/null 2>&1

      - name: Install Playwright (if FT sources exist)
        if: env.BUILD_MODE != 'build' || steps.precheck.outputs.needed == 'true'
        continue-on-error: true
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          HAS_FT=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/user_feeds?url=like.*ft.com*&select=id&limit=1" \
            | python3 -c "import sys,json; print('true' if json.load(sys.stdin) else 'false')")
          if [ "$HAS_FT" = "true" ]; then
            # If install fails, emit a warning annotation but exit 0 so the
            # build step still runs. _extract_ft_articles falls back to an
            # empty Section when playwright is unimportable, so non-FT
            # users build fine and FT users just miss FT for that run.
            if pip install playwright > /dev/null 2>&1 \
               && playwright install chromium --with-deps > /dev/null 2>&1; then
              echo "Playwright installed for FT extraction"
            else
              echo "::warning::Playwright install failed; FT extraction will be skipped this run"
            fi
          fi

      - name: Build newspaper
        if: env.BUILD_MODE != 'build' || steps.precheck.outputs.needed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_ALERT_EMAIL: ${{ secrets.ADMIN_ALERT_EMAIL }}
          BUILD_RECORD_ID: ${{ github.event.client_payload.record_id }}
          BUILD_MODE: ${{ env.BUILD_MODE }}
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: python scripts/build_for_users.py > /dev/null 2>&1

      - name: Clean up old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Delete runs older than 48 hours (keeps Actions page clean)
          cutoff=$(date -u -d '48 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-48H +%Y-%m-%dT%H:%M:%SZ)
          gh api "repos/${{ github.repository }}/actions/workflows/build-newspaper.yml/runs?per_page=100&status=completed&created=<${cutoff}" \
            --jq '.workflow_runs[].id' 2>/dev/null | while read id; do
            [ "$id" != "${{ github.run_id }}" ] && gh api "repos/${{ github.repository }}/actions/runs/$id" -X DELETE 2>/dev/null || true
          done
