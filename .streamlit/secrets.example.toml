# Google OAuth2 credentials for Drive + Gmail delivery.
#
# Setup:
# 1. Go to console.cloud.google.com and create a project
# 2. Enable the Google Drive API and Gmail API
# 3. Configure the OAuth consent screen (External, Testing mode)
# 4. Create an OAuth client ID (Web application)
# 5. Add http://localhost:8501 as an authorized redirect URI
# 6. Copy the client ID and secret below
# 7. Rename this file to secrets.toml
#
# Cost: Free. Both APIs have generous free quotas.
# Note: In Testing mode, refresh tokens expire after 7 days.

[google]
client_id = "YOUR_CLIENT_ID.apps.googleusercontent.com"
client_secret = "YOUR_CLIENT_SECRET"
redirect_uri = "http://localhost:8501"
